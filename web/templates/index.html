<!DOCTYPE html>
<html>
<head>
    <title>Binance Trading Bot</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }
        form {
            margin-top: 40px;
        }
        input, select {
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: orange;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            color: lightgreen;
        }
        .result-card {
    margin-top: 30px;
    background-color: #1c1c1c;
    padding: 20px;
    border-radius: 8px;
    display: inline-block;
    text-align: left;
    color: #00ff99;
    box-shadow: 0 0 10px rgba(0,255,150,0.3);
}
.result-card h3 {
    color: orange;
}
    </style>
</head>
<body>

<h1>Binance Futures Order Bot</h1>

<form method="POST">
    <select name="order_type">
        <option value="MARKET">Market</option>
        <option value="LIMIT">Limit</option>
    </select>

    <input type="text" name="symbol" placeholder="BTCUSDT" required>
    
    <select name="side">
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
    </select>

    <input type="number" step="0.001" name="quantity" placeholder="Quantity" required>

    <input type="number" step="0.01" name="price" placeholder="Price (for Limit only)">

    <br>
    <button type="submit">Execute Order</button>
</form>

<!-- {% if result %}
<div class="result">
    <h3>Result:</h3>
    <pre>{{ result }}</pre>
</div>
{% endif %} -->
{% if result %}
<div class="result-card">
    <h3>Order Executed Successfully</h3>
    <p><strong>Order ID:</strong> {{ result.orderId }}</p>
    <p><strong>Symbol:</strong> {{ result.symbol }}</p>
    <p><strong>Side:</strong> {{ result.side }}</p>
    <p><strong>Type:</strong> {{ result.type }}</p>
    <p><strong>Quantity:</strong> {{ result.quantity }}</p>
    <p><strong>Status:</strong> {{ result.status }}</p>
    <p><strong>Mode:</strong> {{ result.mode }}</p>
</div>
{% endif %}

</body>
</html>
