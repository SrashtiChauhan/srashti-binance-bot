<!DOCTYPE html>
<html>
<head>
    <title>Binance Futures Order Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Binance Futures Order Bot</h1>

<form method="POST">

    <select name="order_type" id="order_type" onchange="toggleFields()">
        <option value="MARKET">Market</option>
        <option value="LIMIT">Limit</option>
        <option value="STOP_LIMIT">Stop-Limit</option>
        <option value="OCO">OCO</option>
        <option value="TWAP">TWAP</option>
    </select>

    <input type="text" name="symbol" placeholder="BTCUSDT" required>

    <select name="side">
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
    </select>

    <input type="number" step="0.001" name="quantity" placeholder="Quantity" required>

    <div id="limit_fields" class="dynamic-field">
    <input type="number" step="0.01" name="price" placeholder="Limit Price">
</div>

<div id="stop_limit_fields" class="dynamic-field">
    <input type="number" step="0.01" name="stop_price" placeholder="Stop Price">
    <input type="number" step="0.01" name="limit_price" placeholder="Limit Price">
</div>

<div id="oco_fields" class="dynamic-field">
    <input type="number" step="0.01" name="take_profit" placeholder="Take Profit">
    <input type="number" step="0.01" name="stop_loss" placeholder="Stop Loss">
</div>

<div id="twap_fields" class="dynamic-field">
    <input type="number" name="duration" placeholder="Duration (seconds)">
</div>

    <button type="submit">Execute Order</button>
</form>

{% if result %}
<div class="result-card">
    <h3>Order Executed</h3>
    <p><strong>Order ID:</strong> {{ result.orderId }}</p>
    <p><strong>Symbol:</strong> {{ result.symbol }}</p>
    <p>
        <strong>Side:</strong> 
        <span class="{{ 'buy' if result.side == 'BUY' else 'sell' }}">
            {{ result.side }}
        </span>
    </p>
    <p><strong>Type:</strong> {{ result.type }}</p>
    <p><strong>Quantity:</strong> {{ result.quantity }}</p>
    <p><strong>Status:</strong> {{ result.status }}</p>
    <p><strong>Mode:</strong> {{ result.mode }}</p>
</div>
{% endif %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
